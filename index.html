<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tank Arena</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span id="score" class="hud-value">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span id="lives" class="hud-value">❤❤❤</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span id="level" class="hud-value">1</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">ENEMIES</span>
      <span id="enemies" class="hud-value">0</span>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="overlay">
    <div id="overlay-content">
      <h1>TANK ARENA</h1>
      <p class="subtitle">WASD / Arrow Keys to move &bull; SPACE to shoot</p>
      <button id="startBtn">START GAME</button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
